aid: amazon-sns
name: Amazon SNS
description: >-
  Amazon Simple Notification Service (SNS) is a fully managed messaging service
  for both application-to-application (A2A) and application-to-person (A2P)
  communication. It enables pub/sub, SMS, email, and mobile push notifications.
